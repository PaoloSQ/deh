  <body data-js-loaded="true">
    <div class="navbar navbar-fixed-top">
      <div class="navbar-inner">
        <div class="container">
          <div class="pull-left">
            <img class="dehlogo" src="/img/icons/deh-logo.png" />

        </div>
      </div>
    </div>

    <div class="container" id="main" style="margin-top: 70px">

        <div class="span4 offset4">

            <div class="widget-header">
              <span class="icon-edit"></span>
              <h3>Acceso a DEH Online</h3>
            </div>

            <div class="widget-content">
              <div class="row-fluid">
                <form
                  class="form"
                  id="login"
                  action="/panel.dehonline.es/auth/login"
                  method="post"
                  accept-charset="utf-8"
                >
                  <input type="hidden" name="redirectUri" value="" />
                  <fieldset>
                    <div class="control-group">
                      <div class="controls">
                        <input class="span12" type="text" name="identity" id="identity" placeholder="Usuario" />
                      </div>
                    </div>
                    <div class="control-group">
                      <div class="controls">
                        <input class="span12" type="password" name="password" id="password" placeholder="Contraseña" />
                      </div>
                    </div>
                  </fieldset>
                  <div>
                    <button class="btn btn-primary">Ingresar</button>
                  </div>
                </form>
                <p class="login-links" id="forgot_password"><a href="/recover">Has perdido tu contraseña?</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
